<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Venn Diagram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #e7eaec;
            padding-bottom: 15px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .set-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .set-input input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .venn-diagram-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            aspect-ratio: 2 / 1;
        }
        
        #venn-svg {
            width: 100%;
            height: 100%;
        }

        /* --- SVG STYLES --- */
        .venn-region {
            fill-opacity: 0; /* Regions are invisible by default */
            transition: fill-opacity 0.3s ease-in-out;
        }
        
        #venn-region-A-only { fill: #3498db; }
        #venn-region-B-only { fill: #e74c3c; }
        #venn-region-intersection { fill: #8e44ad; }
        
        .venn-region.highlighted {
            fill-opacity: 0.6;
        }

        .venn-outline {
            fill: none;
            stroke: #2c3e50;
            stroke-width: 4;
        }
        
        .venn-label {
            font-size: 28px;
            font-weight: bold;
            fill: #34495e;
            text-anchor: middle;
        }

        .venn-elements {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            fill: #000;
            pointer-events: none;
            text-anchor: middle;
        }

        .operations {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .operations button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: inherit;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .operations button:hover {
            background-color: #2980b9;
        }
        .operations button.reset {
            background-color: #95a5a6;
        }
        .operations button.reset:hover {
            background-color: #7f8c8d;
        }

        .results-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 8px;
            min-height: 50px;
            text-align: center;
        }

        .results-container p {
            margin: 0;
            font-size: 1.2em;
            color: #2c3e50;
        }
        #result-set {
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.3em;
        }
        
        @media (max-width: 600px) {
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Interactive Venn Diagram Creator</h2>

        <div class="controls">
            <div class="set-input">
                <label for="setA">Set A (comma-separated):</label>
                <input type="text" id="setA" placeholder="e.g., 1, 2, 3, apple">
            </div>
            <div class="set-input">
                <label for="setB">Set B (comma-separated):</label>
                <input type="text" id="setB" placeholder="e.g., 3, 4, apple, banana">
            </div>
        </div>

        <div class="venn-diagram-container">
            <svg id="venn-svg" viewBox="0 0 600 300">
                <!-- 
                  SVG Coordinates have been adjusted as requested:
                  - Original Circle A (cx=210) moved left by 55px to cx=155.
                  - Original Circle B (cx=290) remains in place.
                  - All paths and text elements recalculated for this new layout.
                -->
                
                <!-- Layer 1: Clickable/Fillable Regions -->
                <path id="venn-region-A-only" class="venn-region" d="M 222.5,76.217782649107 A 100,100 0 1,0 155,250 A 100,100 0 0,0 222.5,223.782217350893 Z"></path>
                <path id="venn-region-B-only" class="venn-region" d="M 222.5,76.217782649107 A 100,100 0 1,1 290,250 A 100,100 0 0,1 222.5,223.782217350893 Z"></path>
                <path id="venn-region-intersection" class="venn-region" d="M 222.5,76.217782649107 A 100,100 0 0,1 222.5,223.782217350893 A 100,100 0 0,1 222.5,76.217782649107 Z"></path>

                <!-- Layer 2: Visual Outlines -->
                <circle cx="155" cy="150" r="100" class="venn-outline" />
                <circle cx="290" cy="150" r="100" class="venn-outline" />
                
                <!-- Layer 3: Labels and Text -->
                <text x="85" y="60" class="venn-label">A</text>
                <text x="360" y="60" class="venn-label">B</text>
                
                <text id="text-A-only" x="135" y="150" class="venn-elements"></text>
                <text id="text-B-only" x="310" y="150" class="venn-elements"></text>
                <text id="text-intersection" x="222.5" y="150" class="venn-elements"></text>
            </svg>
        </div>

        <div class="operations">
            <button id="op-union">Union (A ∪ B)</button>
            <button id="op-intersection">Intersection (A ∩ B)</button>
            <button id="op-diff-A">A - B</button>
            <button id="op-diff-B">B - A</button>
            <button id="op-reset" class="reset">Reset</button>
        </div>

        <div class="results-container">
            <p id="result-text">Click an operation to see the result.</p>
            <p id="result-set"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const setAInput = document.getElementById('setA');
            const setBInput = document.getElementById('setB');
            
            const regionAOnly = document.getElementById('venn-region-A-only');
            const regionBOnly = document.getElementById('venn-region-B-only');
            const regionIntersection = document.getElementById('venn-region-intersection');
            const allRegions = [regionAOnly, regionBOnly, regionIntersection];

            const textAOnly = document.getElementById('text-A-only');
            const textBOnly = document.getElementById('text-B-only');
            const textIntersection = document.getElementById('text-intersection');

            const resultText = document.getElementById('result-text');
            const resultSetDisplay = document.getElementById('result-set');

            function updateVennDiagram() {
                const setA = parseInput(setAInput.value);
                const setB = parseInput(setBInput.value);

                const intersection = new Set([...setA].filter(x => setB.has(x)));
                const differenceA = new Set([...setA].filter(x => !setB.has(x)));
                const differenceB = new Set([...setB].filter(x => !setA.has(x)));

                renderElements(textAOnly, differenceA);
                renderElements(textBOnly, differenceB);
                renderElements(textIntersection, intersection);
            }

            function parseInput(value) {
                if (!value.trim()) return new Set();
                const elements = value.split(',').map(el => el.trim()).filter(Boolean);
                return new Set(elements);
            }

            function renderElements(textElement, set) {
                textElement.innerHTML = '';
                const elements = Array.from(set);
                const yOffset = -(elements.length - 1) * 0.5 * 1.2; 

                elements.forEach((el, i) => {
                    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                    tspan.setAttribute('x', textElement.getAttribute('x'));
                    tspan.setAttribute('dy', i === 0 ? `${yOffset}em` : '1.2em');
                    tspan.textContent = el;
                    textElement.appendChild(tspan);
                });
            }

            function clearHighlights() {
                allRegions.forEach(region => region.classList.remove('highlighted'));
            }
            
            function formatSet(set) {
                const sortedArray = Array.from(set).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
                return `{ ${sortedArray.join(', ')} }`;
            }

            document.getElementById('op-union').addEventListener('click', () => {
                clearHighlights();
                allRegions.forEach(region => region.classList.add('highlighted'));
                
                const setA = parseInput(setAInput.value);
                const setB = parseInput(setBInput.value);
                const union = new Set([...setA, ...setB]);
                
                resultText.textContent = 'A ∪ B =';
                resultSetDisplay.textContent = formatSet(union);
            });

            document.getElementById('op-intersection').addEventListener('click', () => {
                clearHighlights();
                regionIntersection.classList.add('highlighted');
                
                const setA = parseInput(setAInput.value);
                const setB = parseInput(setBInput.value);
                const intersection = new Set([...setA].filter(x => setB.has(x)));
                
                resultText.textContent = 'A ∩ B =';
                resultSetDisplay.textContent = formatSet(intersection);
            });

            document.getElementById('op-diff-A').addEventListener('click', () => {
                clearHighlights();
                regionAOnly.classList.add('highlighted');
                
                const setA = parseInput(setAInput.value);
                const setB = parseInput(setBInput.value);
                const differenceA = new Set([...setA].filter(x => !setB.has(x)));
                
                resultText.textContent = 'A - B =';
                resultSetDisplay.textContent = formatSet(differenceA);
            });
            
            document.getElementById('op-diff-B').addEventListener('click', () => {
                clearHighlights();
                regionBOnly.classList.add('highlighted');
                
                const setA = parseInput(setAInput.value);
                const setB = parseInput(setBInput.value);
                const differenceB = new Set([...setB].filter(x => !setA.has(x)));
                
                resultText.textContent = 'B - A =';
                resultSetDisplay.textContent = formatSet(differenceB);
            });

            document.getElementById('op-reset').addEventListener('click', () => {
                clearHighlights();
                setAInput.value = '1, 2, 3, apple';
                setBInput.value = '3, 4, apple, banana';
                updateVennDiagram();
                resultText.textContent = 'Click an operation to see the result.';
                resultSetDisplay.textContent = '';
            });

            setAInput.addEventListener('input', updateVennDiagram);
            setBInput.addEventListener('input', updateVennDiagram);

            document.getElementById('op-reset').click();
        });
    </script>

</body>
</html>

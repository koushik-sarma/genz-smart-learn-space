<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance and Section Formula Simulator</title>
    <style>
        :root {
            --color-a: #e74c3c; /* Red */
            --color-b: #3498db; /* Blue */
            --color-p: #9b59b6; /* Purple */
            --color-line: #2c3e50; /* Dark Blue/Grey */
            --color-bg: #f4f6f9;
            --color-panel: #ffffff;
            --color-text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none; /* Prevents text selection during drag */
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            width: 100%;
            max-width: 1300px;
            background: var(--color-panel);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .panel {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .simulation-container {
            flex: 2;
            min-width: 500px;
            min-height: 500px;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden; /* Ensures SVG doesn't overflow */
        }

        .info-card {
            background-color: #fdfdfd;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e7e7e7;
        }

        h1, h2, h3 {
            margin-top: 0;
            color: #1a237e;
        }
        h1 { text-align: center; width: 100%; margin-bottom: 10px; }
        h3 { border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; margin-bottom: 10px; }

        .formula {
            font-family: 'Courier New', Courier, monospace;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            font-size: 1.1em;
            word-wrap: break-word;
        }
        .coord-display { font-weight: bold; }
        #coord-a { color: var(--color-a); }
        #coord-b { color: var(--color-b); }
        #coord-p { color: var(--color-p); }
        
        /* --- SVG Styling --- */
        #plane {
            width: 100%;
            height: 100%;
        }
        .grid-line { stroke: #e0e0e0; stroke-width: 1; }
        .axis-line { stroke: #999; stroke-width: 2; }
        .main-line { stroke: var(--color-line); stroke-width: 3; }
        .triangle-line { stroke: var(--color-line); stroke-width: 2; stroke-dasharray: 4 4; }
        
        .point { stroke: #fff; stroke-width: 2; cursor: grab; }
        .point:active { cursor: grabbing; }
        #pointA { fill: var(--color-a); }
        #pointB { fill: var(--color-b); }
        #pointP { fill: var(--color-p); }
        .point-label { font-size: 16px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Distance & Section Formula</h1>

        <!-- Left Panel: Information Display -->
        <div class="panel">
            <div class="info-card">
                <h3>Coordinates</h3>
                <p>Drag the points on the graph.</p>
                <p class="coord-display">A(x₁, y₁) = <span id="coord-a"></span></p>
                <p class="coord-display">B(x₂, y₂) = <span id="coord-b"></span></p>
            </div>

            <div class="info-card">
                <h3>Distance Formula</h3>
                <div class="formula" id="distance-formula"></div>
            </div>

            <div class="info-card">
                <h3>Section Formula</h3>
                <p>Drag point P along the line AB.</p>
                <p>Actual P coords: <span class="coord-display" id="coord-p"></span></p>
                <p>Ratio AP : PB = <span class="coord-display" id="ratio-display"></span></p>
                <div class="formula" id="section-formula"></div>
            </div>
        </div>

        <!-- Right Panel: The Interactive SVG Plane -->
        <div class="simulation-container">
            <svg id="plane" viewBox="0 0 500 500">
                <!-- Defs for marker arrows or glow effects -->
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
                        <feMerge>
                            <feMergeNode in="coloredBlur"></feMergeNode>
                            <feMergeNode in="SourceGraphic"></feMergeNode>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Grid and Axes -->
                <g id="grid"></g>
                <g id="axes">
                    <line class="axis-line" id="x-axis"></line>
                    <line class="axis-line" id="y-axis"></line>
                </g>

                <!-- Geometric Elements -->
                <g id="geometry">
                    <line class="triangle-line" id="deltaX-line"></line>
                    <line class="triangle-line" id="deltaY-line"></line>
                    <line class="main-line" id="main-line"></line>
                    <circle class="point" id="pointA" r="8"></circle>
                    <circle class="point" id="pointB" r="8"></circle>
                    <circle class="point" id="pointP" r="7"></circle>
                    <text class="point-label" id="labelA" fill="var(--color-a)">A</text>
                    <text class="point-label" id="labelB" fill="var(--color-b)">B</text>
                    <text class="point-label" id="labelP" fill="var(--color-p)">P</text>
                    <text class="point-label" id="labelDeltaX"></text>
                    <text class="point-label" id="labelDeltaY"></text>
                </g>
            </svg>
        </div>
    </div>

<script>
    // --- JAVASCRIPT LOGIC ---

    // 1. SETUP SVG AND COORDINATE SYSTEM
    const svg = document.getElementById('plane');
    const geometryGroup = document.getElementById('geometry');
    const SVG_WIDTH = 500;
    const SVG_HEIGHT = 500;
    const GRAPH_MIN = -10;
    const GRAPH_MAX = 10;
    const GRAPH_RANGE = GRAPH_MAX - GRAPH_MIN;
    
    // Helper to convert graph coordinates to SVG pixel coordinates
    function toSvgCoords(p) {
        const svgX = ((p.x - GRAPH_MIN) / GRAPH_RANGE) * SVG_WIDTH;
        const svgY = ((GRAPH_MAX - p.y) / GRAPH_RANGE) * SVG_HEIGHT; // Y is inverted
        return { x: svgX, y: svgY };
    }

    // Helper to convert SVG pixel coordinates to graph coordinates
    function toGraphCoords(p) {
        const graphX = (p.x / SVG_WIDTH) * GRAPH_RANGE + GRAPH_MIN;
        const graphY = GRAPH_MAX - (p.y / SVG_HEIGHT) * GRAPH_RANGE; // Y is inverted
        return { x: graphX, y: graphY };
    }

    // 2. STATE AND ELEMENT REFERENCES
    const state = {
        a: { x: -6, y: -4 },
        b: { x: 5, y: 7 },
        t: 0.5, // P's position as a ratio along AB (0=A, 1=B)
        p: { x: 0, y: 0 }
    };

    const elements = {
        coordA: document.getElementById('coord-a'),
        coordB: document.getElementById('coord-b'),
        coordP: document.getElementById('coord-p'),
        distanceFormula: document.getElementById('distance-formula'),
        sectionFormula: document.getElementById('section-formula'),
        ratioDisplay: document.getElementById('ratio-display'),
        pointA: document.getElementById('pointA'),
        pointB: document.getElementById('pointB'),
        pointP: document.getElementById('pointP'),
        mainLine: document.getElementById('main-line'),
        deltaXLine: document.getElementById('deltaX-line'),
        deltaYLine: document.getElementById('deltaY-line'),
        labelA: document.getElementById('labelA'),
        labelB: document.getElementById('labelB'),
        labelP: document.getElementById('labelP'),
        labelDeltaX: document.getElementById('labelDeltaX'),
        labelDeltaY: document.getElementById('labelDeltaY')
    };
    
    // 3. DRAWING AND UPDATING FUNCTIONS

    function drawGridAndAxes() {
        const grid = document.getElementById('grid');
        const xAxis = document.getElementById('x-axis');
        const yAxis = document.getElementById('y-axis');
        grid.innerHTML = ''; // Clear previous grid

        for (let i = GRAPH_MIN; i <= GRAPH_MAX; i++) {
            // Vertical lines
            const vLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            const vStart = toSvgCoords({x: i, y: GRAPH_MIN});
            const vEnd = toSvgCoords({x: i, y: GRAPH_MAX});
            vLine.setAttribute('x1', vStart.x); vLine.setAttribute('y1', vStart.y);
            vLine.setAttribute('x2', vEnd.x); vLine.setAttribute('y2', vEnd.y);
            vLine.setAttribute('class', 'grid-line');
            grid.appendChild(vLine);

            // Horizontal lines
            const hLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            const hStart = toSvgCoords({x: GRAPH_MIN, y: i});
            const hEnd = toSvgCoords({x: GRAPH_MAX, y: i});
            hLine.setAttribute('x1', hStart.x); hLine.setAttribute('y1', hStart.y);
            hLine.setAttribute('x2', hEnd.x); hLine.setAttribute('y2', hEnd.y);
            hLine.setAttribute('class', 'grid-line');
            grid.appendChild(hLine);
        }
        
        const origin = toSvgCoords({x: 0, y: 0});
        xAxis.setAttribute('x1', 0); xAxis.setAttribute('y1', origin.y);
        xAxis.setAttribute('x2', SVG_WIDTH); xAxis.setAttribute('y2', origin.y);
        yAxis.setAttribute('x1', origin.x); yAxis.setAttribute('y1', 0);
        yAxis.setAttribute('x2', origin.x); yAxis.setAttribute('y2', SVG_HEIGHT);
    }

    function update() {
        // --- A. CALCULATE DERIVED STATE ---
        // Calculate P's position based on A, B, and the ratio 't'
        state.p.x = state.a.x + state.t * (state.b.x - state.a.x);
        state.p.y = state.a.y + state.t * (state.b.y - state.a.y);
        
        const a_svg = toSvgCoords(state.a);
        const b_svg = toSvgCoords(state.b);
        const p_svg = toSvgCoords(state.p);
        
        // Corner of the right-angled triangle
        const corner_graph = { x: state.b.x, y: state.a.y };
        const corner_svg = toSvgCoords(corner_graph);
        
        // --- B. UPDATE SVG ELEMENT POSITIONS ---
        elements.pointA.setAttribute('cx', a_svg.x);
        elements.pointA.setAttribute('cy', a_svg.y);
        elements.pointB.setAttribute('cx', b_svg.x);
        elements.pointB.setAttribute('cy', b_svg.y);
        elements.pointP.setAttribute('cx', p_svg.x);
        elements.pointP.setAttribute('cy', p_svg.y);

        elements.mainLine.setAttribute('x1', a_svg.x);
        elements.mainLine.setAttribute('y1', a_svg.y);
        elements.mainLine.setAttribute('x2', b_svg.x);
        elements.mainLine.setAttribute('y2', b_svg.y);

        elements.deltaXLine.setAttribute('x1', a_svg.x);
        elements.deltaXLine.setAttribute('y1', a_svg.y);
        elements.deltaXLine.setAttribute('x2', corner_svg.x);
        elements.deltaXLine.setAttribute('y2', corner_svg.y);

        elements.deltaYLine.setAttribute('x1', corner_svg.x);
        elements.deltaYLine.setAttribute('y1', corner_svg.y);
        elements.deltaYLine.setAttribute('x2', b_svg.x);
        elements.deltaYLine.setAttribute('y2', b_svg.y);

        // Update labels
        const labelOffset = 15;
        elements.labelA.setAttribute('x', a_svg.x - labelOffset);
        elements.labelA.setAttribute('y', a_svg.y - labelOffset / 2);
        elements.labelB.setAttribute('x', b_svg.x + labelOffset / 2);
        elements.labelB.setAttribute('y', b_svg.y - labelOffset);
        elements.labelP.setAttribute('x', p_svg.x + labelOffset / 2);
        elements.labelP.setAttribute('y', p_svg.y + labelOffset);
        
        elements.labelDeltaX.setAttribute('x', (a_svg.x + corner_svg.x) / 2);
        elements.labelDeltaX.setAttribute('y', a_svg.y + labelOffset);
        elements.labelDeltaX.textContent = `Δx=${(state.b.x - state.a.x).toFixed(1)}`;
        
        elements.labelDeltaY.setAttribute('x', corner_svg.x + labelOffset / 2);
        elements.labelDeltaY.setAttribute('y', (corner_svg.y + b_svg.y) / 2);
        elements.labelDeltaY.textContent = `Δy=${(state.b.y - state.a.y).toFixed(1)}`;

        // --- C. UPDATE INFO PANEL ---
        const { a, b, p } = state;
        elements.coordA.textContent = `(${a.x.toFixed(1)}, ${a.y.toFixed(1)})`;
        elements.coordB.textContent = `(${b.x.toFixed(1)}, ${b.y.toFixed(1)})`;
        elements.coordP.textContent = `(${p.x.toFixed(1)}, ${p.y.toFixed(1)})`;

        // Distance Formula
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx**2 + dy**2);
        elements.distanceFormula.innerHTML = `d = √[(x₂-x₁)²+(y₂-y₁)²]<br>
           d = √[(${b.x.toFixed(1)} - ${a.x.toFixed(1)})² + (${b.y.toFixed(1)} - ${a.y.toFixed(1)})²]<br>
           d = √[(${dx.toFixed(1)})² + (${dy.toFixed(1)})²] = <strong>${dist.toFixed(2)}</strong>`;
           
        // Section Formula
        const m = state.t;
        const n = 1 - state.t;
        const px_formula = (n * a.x + m * b.x) / (m + n);
        const py_formula = (n * a.y + m * b.y) / (m + n);
        
        // Simplify ratio (e.g., 0.25:0.75 -> 1:3)
        let ratioM = m / Math.min(m, n) || 1; // Avoid div by zero
        let ratioN = n / Math.min(m, n) || 1;
        if (Math.abs(m)<0.01) { ratioM = 0; ratioN = 1;}
        if (Math.abs(n)<0.01) { ratioM = 1; ratioN = 0;}
        elements.ratioDisplay.textContent = `${ratioM.toFixed(2)} : ${ratioN.toFixed(2)}`;

        elements.sectionFormula.innerHTML = `
            P(x) = (n·x₁ + m·x₂) / (m+n)<br>
            P(x) = (${n.toFixed(2)}·${a.x.toFixed(1)} + ${m.toFixed(2)}·${b.x.toFixed(1)}) / 1 = <strong>${px_formula.toFixed(1)}</strong><br>
            P(y) = (n·y₁ + m·y₂) / (m+n)<br>
            P(y) = (${n.toFixed(2)}·${a.y.toFixed(1)} + ${m.toFixed(2)}·${b.y.toFixed(1)}) / 1 = <strong>${py_formula.toFixed(1)}</strong>`;
    }

    // 4. DRAG-AND-DROP LOGIC
    let activeElement = null;

    function startDrag(evt) {
        if (evt.target.classList.contains('point')) {
            activeElement = evt.target;
            activeElement.style.filter = 'url(#glow)';
            svg.addEventListener('mousemove', drag);
            svg.addEventListener('mouseup', endDrag);
            svg.addEventListener('mouseleave', endDrag);
        }
    }

    function drag(evt) {
        if (!activeElement) return;
        evt.preventDefault();
        
        // Get mouse position in SVG coordinate space
        const pt = new DOMPoint(evt.clientX, evt.clientY);
        const svgMousePos = pt.matrixTransform(svg.getScreenCTM().inverse());
        
        if (activeElement.id === 'pointA' || activeElement.id === 'pointB') {
            const graphCoords = toGraphCoords(svgMousePos);
            const pointKey = activeElement.id === 'pointA' ? 'a' : 'b';
            state[pointKey].x = graphCoords.x;
            state[pointKey].y = graphCoords.y;
        } else if (activeElement.id === 'pointP') {
            // Project mouse position onto the line segment AB to find the closest point
            const {a, b} = state;
            const mouseGraph = toGraphCoords(svgMousePos);
            const vec_ab = { x: b.x - a.x, y: b.y - a.y };
            const vec_am = { x: mouseGraph.x - a.x, y: mouseGraph.y - a.y };
            
            const dot_ab = vec_ab.x**2 + vec_ab.y**2;
            if (dot_ab < 1e-9) { // A and B are the same point
                state.t = 0;
            } else {
                const dot_am_ab = vec_am.x * vec_ab.x + vec_am.y * vec_ab.y;
                // 't' is the projection factor, clamped between 0 and 1
                state.t = Math.max(0, Math.min(1, dot_am_ab / dot_ab));
            }
        }
        
        update();
    }

    function endDrag() {
        if (activeElement) {
            activeElement.style.filter = 'none';
        }
        activeElement = null;
        svg.removeEventListener('mousemove', drag);
        svg.removeEventListener('mouseup', endDrag);
        svg.removeEventListener('mouseleave', endDrag);
    }
    
    svg.addEventListener('mousedown', startDrag);

    // 5. INITIALIZE
    drawGridAndAxes();
    update();

</script>
</body>
</html>
